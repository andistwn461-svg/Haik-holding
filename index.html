<!DOCTYPE html>
<html lang="id">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HAIK HOLDING</title>
<meta name="application-name" content="Haik Holding">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Haik Holding">
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #7A6130;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --dark4: #2A2A2A;
    --border: #2E2E2E;
    --text: #E8E2D5;
    --text-dim: #888070;
    --red: #C05040;
    --green: #4A8C6A;
    --blue: #4A6A9C;
    --purple: #7A5A9C;

    --karaoke: #C9A84C;
    --retail: #4A8C6A;
    --invest: #4A6A9C;
    --property: #7A5A9C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-gold {
    background: var(--gold);
    color: var(--dark);
  }
  .btn-gold:hover { background: var(--gold-light); }

  .btn-outline {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid #3A1A15;
    padding: 5px 10px;
    font-size: 11px;
  }
  .btn-danger:hover { background: #3A1A15; }

  .btn-sm {
    padding: 5px 12px;
    font-size: 11px;
  }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ── UNIT CARDS ── */
  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .unit-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .unit-card:hover { border-color: #3E3E3E; }

  .unit-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .unit-header:hover { background: var(--dark3); }

  .unit-title-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .unit-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .unit-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .unit-toggle {
    color: var(--text-dim);
    font-size: 18px;
    transition: transform 0.2s;
    line-height: 1;
  }

  .unit-toggle.open { transform: rotate(90deg); }

  .unit-body {
    padding: 0;
    display: none;
  }

  .unit-body.open { display: block; }

  /* ── DEPARTMENT ── */
  .dept {
    border-bottom: 1px solid var(--border);
  }

  .dept:last-child { border-bottom: none; }

  .dept-header {
    padding: 12px 20px 12px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }

  .dept-header:hover { background: var(--dark3); }

  .dept-name-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .dept-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .dept-count {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    background: var(--dark4);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .dept-actions {
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .dept-header:hover .dept-actions { opacity: 1; }

  .dept-toggle {
    color: var(--text-dim);
    font-size: 14px;
    transition: transform 0.2s;
    margin-left: 4px;
  }

  .dept-toggle.open { transform: rotate(90deg); }

  /* ── ITEMS ── */
  .dept-items {
    display: none;
    padding: 8px 20px 12px 52px;
    background: var(--dark);
  }

  .dept-items.open { display: block; }

  .item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #1A1A1A;
    group: true;
  }

  .item:last-child { border-bottom: none; }

  .item-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .item-name {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
    font-family: 'DM Mono', monospace;
  }

  .item-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .item:hover .item-actions { opacity: 1; }
  .item:hover .item-name { color: var(--text); }

  /* Sub-items (level 4) */
  .sub-items {
    padding: 4px 0 0 16px;
    display: none;
  }

  .sub-items.open { display: block; }

  .sub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #151515;
  }

  .sub-item:last-child { border-bottom: none; }

  .sub-item-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .sub-item-name {
    font-size: 11px;
    color: #555;
    flex: 1;
    font-family: 'DM Mono', monospace;
  }

  .sub-item:hover .sub-item-name { color: var(--text-dim); }

  .sub-item-actions {
    opacity: 0;
    display: flex;
    gap: 4px;
    transition: opacity 0.15s;
  }

  .sub-item:hover .sub-item-actions { opacity: 1; }

  /* ── INLINE EDIT ── */
  .inline-input {
    background: var(--dark4);
    border: 1px solid var(--gold-dim);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    width: 200px;
  }

  .inline-input:focus { border-color: var(--gold); }

  /* ── ADD BUTTONS ── */
  .add-row {
    padding: 8px 20px 8px 52px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--dark);
    border-top: 1px dashed var(--border);
    transition: color 0.15s;
  }

  .add-row:hover { color: var(--gold); }

  .add-dept-row {
    padding: 10px 20px 10px 36px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    border-top: 1px dashed var(--border);
    transition: color 0.15s;
  }

  .add-dept-row:hover { color: var(--gold); }

  /* ── ICON BTN ── */
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 12px;
    transition: background 0.15s;
    line-height: 1;
  }

  .icon-btn:hover { background: var(--dark4); }

  .icon-edit { color: var(--gold-dim); }
  .icon-edit:hover { color: var(--gold) !important; background: #2A2210 !important; }

  .icon-del { color: #4A2A25; }
  .icon-del:hover { color: var(--red) !important; background: #2A1510 !important; }

  /* ── HOLDING NODE ── */
  .holding-node {
    background: linear-gradient(135deg, #1A1608, #0D0D0D);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 20px 28px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .holding-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .holding-icon {
    width: 44px;
    height: 44px;
    background: var(--gold);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .holding-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .holding-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-top: 3px;
    letter-spacing: 1px;
  }

  .unit-stats {
    display: flex;
    gap: 20px;
  }

  .stat-box {
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--gold);
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 420px;
    max-width: 90vw;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    margin-bottom: 20px;
  }

  .modal label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 6px;
  }

  .modal input, .modal select {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
  }

  .modal input:focus, .modal select:focus {
    border-color: var(--gold-dim);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--dark2);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── ITEM EXPAND TOGGLE ── */
  .item-expand { cursor: pointer; color: var(--text-dim); font-size: 11px; }
  .item-expand.open { color: var(--gold); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Colors per unit */
  [data-unit="karaoke"] .unit-dot { background: var(--karaoke); }
  [data-unit="karaoke"] .unit-name { color: var(--karaoke); }
  [data-unit="retail"] .unit-dot { background: var(--retail); }
  [data-unit="retail"] .unit-name { color: var(--retail); }
  [data-unit="invest"] .unit-dot { background: var(--blue); }
  [data-unit="invest"] .unit-name { color: var(--blue); }
  [data-unit="property"] .unit-dot { background: var(--purple); }
  [data-unit="property"] .unit-name { color: var(--purple); }
</style>
</head>

  </div>

  <!-- Units Grid -->

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Tambah Item</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Batal</button>
      <button class="btn btn-gold" id="modal-confirm">Simpan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

        {

          items: [
            { id: "i53", name: "Tanah", subs: [] },
            { id: "i54", name: "Ruko", subs: [] },
            { id: "i55", name: "Gudang", subs: [] }
          ]
        },
        {
          id: "d15", name: "Properti Sewa", open: false,

            { id: "i56", name: "Penyewa", subs: [] },
            { id: "i57", name: "Kontrak", subs: [] },

// ── ID GENERATOR ──────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 8); }

// ── RENDER ────────────────────────────────────────────────
function render() {
  updateStats();
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  data.units.forEach(unit => {
    grid.appendChild(buildUnitCard(unit));
  });
}

function updateStats() {
  let totalDepts = 0, totalItems = 0;
  data.units.forEach(u => {
    totalDepts += u.departments.length;
    u.departments.forEach(d => {
      totalItems += d.items.length;
      d.items.forEach(i => totalItems += (i.subs || []).length);
    });
  });
  document.getElementById('stat-units').textContent = data.units.length;
  document.getElementById('stat-depts').textContent = totalDepts;
  document.getElementById('stat-items').textContent = totalItems;
  document.getElementById('holding-meta').textContent =
    `${data.units.length} unit bisnis · ${totalDepts} departemen`;
}

function buildUnitCard(unit) {
  const card = document.createElement('div');
  card.className = 'unit-card';
  card.dataset.unit = unit.id;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'unit-header';
  hdr.innerHTML = `
    <div class="unit-title-wrap">
      <div class="unit-dot" style="background:${unit.color}"></div>
      <div class="unit-name" style="color:${unit.color}">${unit.emoji} ${unit.name}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="icon-btn icon-edit" onclick="editUnit('${unit.id}');event.stopPropagation()">✏️</button>
      <button class="icon-btn icon-del" onclick="deleteUnit('${unit.id}');event.stopPropagation()">✕</button>
      <div class="unit-toggle ${unit.open ? 'open' : ''}">›</div>
    </div>`;
  hdr.addEventListener('click', () => {
    unit.open = !unit.open;
    render();
  });
  card.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'unit-body' + (unit.open ? ' open' : '');

  unit.departments.forEach(dept => {
    body.appendChild(buildDept(unit, dept));
  });

  // Add dept
  const addDept = document.createElement('div');
  addDept.className = 'add-dept-row';
  addDept.innerHTML = `<span style="color:${unit.color}">+</span> Tambah Departemen`;
  addDept.addEventListener('click', () => openAddDept(unit.id));
  body.appendChild(addDept);

  card.appendChild(body);
  return card;
}

function buildDept(unit, dept) {
  const el = document.createElement('div');
  el.className = 'dept';

  const hdr = document.createElement('div');
  hdr.className = 'dept-header';
  hdr.innerHTML = `
    <div class="dept-name-wrap">
      <div class="dept-name">${dept.name}</div>
      <div class="dept-count">${dept.items.length}</div>
    </div>
    <div class="dept-actions">
      <button class="icon-btn icon-edit" onclick="editDept('${unit.id}','${dept.id}');event.stopPropagation()">✏️</button>
      <button class="icon-btn icon-del" onclick="deleteDept('${unit.id}','${dept.id}');event.stopPropagation()">✕</button>
    </div>
    <div class="dept-toggle ${dept.open ? 'open' : ''}">›</div>`;
  hdr.addEventListener('click', () => {
    dept.open = !dept.open;
    render();
  });
  el.appendChild(hdr);

  const items = document.createElement('div');
  items.className = 'dept-items' + (dept.open ? ' open' : '');

  dept.items.forEach(item => {
    items.appendChild(buildItem(unit, dept, item));
  });

  // Add item
  const addItem = document.createElement('div');
  addItem.className = 'add-row';
  addItem.innerHTML = `<span>+</span> Tambah Item`;
  addItem.addEventListener('click', () => openAddItem(unit.id, dept.id));
  items.appendChild(addItem);

  el.appendChild(items);
  return el;
}

function buildItem(unit, dept, item) {
  const el = document.createElement('div');
  el.className = 'item';

  const hasSubs = item.subs && item.subs.length > 0;

  el.innerHTML = `
    <div class="item-dot" style="background:${unit.color}77"></div>
    <div class="item-name">${item.name}</div>
    ${hasSubs ? `<span class="item-expand ${item._open?'open':''}" data-item="${item.id}">▸ ${item.subs.length}</span>` : ''}
    <div class="item-actions">
      <button class="icon-btn" style="color:#4A6A4A;font-size:10px" onclick="openAddSub('${unit.id}','${dept.id}','${item.id}');event.stopPropagation()">+sub</button>
      <button class="icon-btn icon-edit" onclick="editItem('${unit.id}','${dept.id}','${item.id}');event.stopPropagation()">✏️</button>
      <button class="icon-btn icon-del" onclick="deleteItem('${unit.id}','${dept.id}','${item.id}');event.stopPropagation()">✕</button>
    </div>`;

  if (hasSubs) {
    const subWrap = document.createElement('div');
    subWrap.style.width = '100%';
    const subList = document.createElement('div');
    subList.className = 'sub-items' + (item._open ? ' open' : '');

    item.subs.forEach(sub => {
      subList.appendChild(buildSubItem(unit, dept, item, sub));
    });

    subWrap.appendChild(subList);
    el.appendChild(subWrap);

    const expandBtn = el.querySelector('.item-expand');
    if (expandBtn) {
      expandBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        item._open = !item._open;
        render();
      });
    }
  }

  return el;
}

function buildSubItem(unit, dept, item, sub) {
  const el = document.createElement('div');
  el.className = 'sub-item';
  el.innerHTML = `
    <div style="width:16px"></div>
    <div class="sub-item-dot"></div>
    <div class="sub-item-name">${sub.name}</div>
    <div class="sub-item-actions">
      <button class="icon-btn icon-edit" onclick="editSub('${unit.id}','${dept.id}','${item.id}','${sub.id}');event.stopPropagation()">✏️</button>
      <button class="icon-btn icon-del" onclick="deleteSub('${unit.id}','${dept.id}','${item.id}','${sub.id}');event.stopPropagation()">✕</button>
    </div>`;
  return el;
}

// ── FIND HELPERS ──────────────────────────────────────────
function findUnit(uid) { return data.units.find(u => u.id === uid); }
function findDept(uid, did) { return findUnit(uid)?.departments.find(d => d.id === did); }
function findItem(uid, did, iid) { return findDept(uid, did)?.items.find(i => i.id === iid); }

// ── MODAL HELPERS ─────────────────────────────────────────
let _modalConfirm = null;

function openModal(title, bodyHTML, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  _modalConfirm = onConfirm;
  document.getElementById('modal-confirm').onclick = () => { onConfirm(); };
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.querySelector('#modal-body input')?.focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── ADD UNIT ──────────────────────────────────────────────
function openAddUnit() {
  openModal('Tambah Unit Bisnis',
    `<label>Nama Unit</label>
     <input id="m-name" placeholder="contoh: HAIK RETAIL" />
     <label>Emoji / Ikon</label>
     <input id="m-emoji" placeholder="🏪" maxlength="4" />
     <label>Warna (hex)</label>
     <input id="m-color" type="color" value="#4A8C6A" style="height:40px;cursor:pointer" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      data.units.push({
        id: uid(), name: name.toUpperCase(),
        color: document.getElementById('m-color').value,
        emoji: document.getElementById('m-emoji').value || '🏢',
        open: true, departments: []
      });
      closeModal(); render(); toast('Unit ditambahkan ✓');
    }
  );
}

// ── EDIT UNIT ─────────────────────────────────────────────
function editUnit(unitId) {
  const u = findUnit(unitId);
  openModal('Edit Unit',
    `<label>Nama Unit</label>
     <input id="m-name" value="${u.name}" />
     <label>Emoji</label>
     <input id="m-emoji" value="${u.emoji}" maxlength="4" />
     <label>Warna</label>
     <input id="m-color" type="color" value="${u.color}" style="height:40px;cursor:pointer" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      u.name = name.toUpperCase();
      u.emoji = document.getElementById('m-emoji').value || u.emoji;
      u.color = document.getElementById('m-color').value;
      closeModal(); render(); toast('Unit diperbarui ✓');
    }
  );
}

function deleteUnit(unitId) {
  if (!confirm('Hapus unit ini beserta semua departemen dan item?')) return;
  data.units = data.units.filter(u => u.id !== unitId);
  render(); toast('Unit dihapus');
}

// ── ADD DEPT ──────────────────────────────────────────────
function openAddDept(unitId) {
  openModal('Tambah Departemen',
    `<label>Nama Departemen</label>
     <input id="m-name" placeholder="contoh: Operasional" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      findUnit(unitId).departments.push({
        id: uid(), name, open: true, items: []
      });
      closeModal(); render(); toast('Departemen ditambahkan ✓');
    }
  );
}

function editDept(unitId, deptId) {
  const d = findDept(unitId, deptId);
  openModal('Edit Departemen',
    `<label>Nama Departemen</label>
     <input id="m-name" value="${d.name}" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      d.name = name;
      closeModal(); render(); toast('Departemen diperbarui ✓');
    }
  );
}

function deleteDept(unitId, deptId) {
  if (!confirm('Hapus departemen ini?')) return;
  const u = findUnit(unitId);
  u.departments = u.departments.filter(d => d.id !== deptId);
  render(); toast('Departemen dihapus');
}

// ── ADD ITEM ──────────────────────────────────────────────
function openAddItem(unitId, deptId) {
  openModal('Tambah Item',
    `<label>Nama Item / SOP</label>
     <input id="m-name" placeholder="contoh: Standar Buka Toko" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      findDept(unitId, deptId).items.push({ id: uid(), name, subs: [] });
      closeModal(); render(); toast('Item ditambahkan ✓');
    }
  );
}

function editItem(unitId, deptId, itemId) {
  const item = findItem(unitId, deptId, itemId);
  openModal('Edit Item',
    `<label>Nama Item</label>
     <input id="m-name" value="${item.name}" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      item.name = name;
      closeModal(); render(); toast('Item diperbarui ✓');
    }
  );
}

function deleteItem(unitId, deptId, itemId) {
  const d = findDept(unitId, deptId);
  d.items = d.items.filter(i => i.id !== itemId);
  render(); toast('Item dihapus');
}

// ── ADD SUB-ITEM ──────────────────────────────────────────
function openAddSub(unitId, deptId, itemId) {
  openModal('Tambah Sub-Item',
    `<label>Nama Sub-Item / Checklist</label>
     <input id="m-name" placeholder="contoh: Cek Saldo Awal" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      const item = findItem(unitId, deptId, itemId);
      if (!item.subs) item.subs = [];
      item.subs.push({ id: uid(), name });
      item._open = true;
      closeModal(); render(); toast('Sub-item ditambahkan ✓');
    }
  );
}

function editSub(unitId, deptId, itemId, subId) {
  const item = findItem(unitId, deptId, itemId);
  const sub = item.subs.find(s => s.id === subId);
  openModal('Edit Sub-Item',
    `<label>Nama Sub-Item</label>
     <input id="m-name" value="${sub.name}" />`,
    () => {
      const name = document.getElementById('m-name').value.trim();
      if (!name) return;
      sub.name = name;
      closeModal(); render(); toast('Sub-item diperbarui ✓');
    }
  );
}

function deleteSub(unitId, deptId, itemId, subId) {
  const item = findItem(unitId, deptId, itemId);
  item.subs = item.subs.filter(s => s.id !== subId);
  render(); toast('Sub-item dihapus');
}

// ── EXPORT / IMPORT ───────────────────────────────────────
function exportJSON() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'haik-holding-struktur.json';
  a.click();
  toast('Data diekspor ✓');
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        data = JSON.parse(ev.target.result);
        render();
        toast('Data diimpor ✓');
      } catch {
        alert('File JSON tidak valid.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    _modalConfirm && _modalConfirm();
  }
});

// ── LOCAL STORAGE ─────────────────────────────────────────
const STORAGE_KEY = 'haik_holding_data';

function saveToStorage() {
  try {
    // Show saving indicator
    const dot = document.getElementById('save-dot');
    const label = document.getElementById('save-label');
    if (dot && label) {
      dot.style.background = '#C9A84C';
      label.textContent = 'Menyimpan...';
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setTimeout(() => {
      if (dot && label) {
        dot.style.background = '#4A8C6A';
        label.textContent = 'Tersimpan ✓';
      }
    }, 400);
  } catch(e) { console.warn('Gagal menyimpan:', e); }
}

function resetData() {
  if (!confirm('Reset semua data ke struktur awal? Semua perubahan akan hilang.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      data = JSON.parse(saved);
      return true;
    }
  } catch(e) { console.warn('Gagal memuat:', e); }
  return false;
}

// Patch semua fungsi yang mengubah data agar auto-save
const _origRender = render;
window.render = function() {
  _origRender();
  saveToStorage();
};

// ── SERVICE WORKER ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'haik-holding-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./')))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: './' })
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW error:', e));
}

  display:none; position:fixed; bottom:0; left:0; right:0;

  <button id="btn-install-now" style="background:#C9A84C;border:none;color:#0D0D0D;padding:8px 16px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer">Install ✓</button>

document.body.appendChild(installBanner);

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.style.display = 'flex';
});

document.getElementById('btn-install-now').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === 'accepted') {
    toast('Haik Holding berhasil diinstall! ✓');
  }
  deferredPrompt = null;
  installBanner.style.display = 'none';
});

document.getElementById('btn-install-cancel').addEventListener('click', () => {
  installBanner.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  toast('Haik Holding berhasil ditambahkan ke layar utama ✓');
  installBanner.style.display = 'none';
});

// ── INIT ──────────────────────────────────────────────────
const loaded = loadFromStorage();
render();
if (loaded) {
  setTimeout(() => toast('Data dimuat otomatis ✓'), 400);
}
